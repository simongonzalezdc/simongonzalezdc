on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        run: apt-get update -qq && apt-get install -y -qq python3 python3-pip
      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then pip install --break-system-packages -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install --break-system-packages -e ".[dev]"; fi
      - name: Lint
        run: |
          pip install --break-system-packages ruff 2>/dev/null
          ruff check . || true
      - name: Test
        run: |
          if [ -f pytest.ini ] || [ -f setup.cfg ] || [ -d tests ]; then
            pip install --break-system-packages pytest 2>/dev/null
            pytest || true
          fi
